<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>project-zero CLI capture</title>
<link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css">
<style>
  html, body { margin: 0; background: #0b0d12; }
  #term { padding: 16px; }
</style>
</head>
<body>
<div id="term"></div>
<script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
<script>
  // Exposes window.pzTerm so capture.mjs can feed captured bytes in and
  // know when rendering has settled.
  const term = new Terminal({
    cols: 100,
    rows: 32,
    fontFamily: 'Menlo, Consolas, ui-monospace, monospace',
    fontSize: 14,
    theme: { background: '#0b0d12', foreground: '#e6e8ee' },
    convertEol: true,
  });
  term.open(document.getElementById('term'));
  window.pzTerm = term;
</script>
</body>
</html>
