name: CI — Build & Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        compiler: [gcc, clang]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q gcc clang make cmake

      - name: Build (release)
        run: make release CC=${{ matrix.compiler }}

      - name: Run tests (Unconstrained)
        run: make test CC=${{ matrix.compiler }}

      - name: Run tests (Aggressive 1-core constraint via taskset)
        run: taskset -c 0 make test CC=${{ matrix.compiler }}

      - name: Run tests (Aggressive 2-core constraint via taskset)
        run: taskset -c 0,1 make test CC=${{ matrix.compiler }}

      - name: Build & Test (CMake + Sanitizers)
        run: |
          mkdir -p build_cmake
          cd build_cmake
          cmake -DCMAKE_C_COMPILER=${{ matrix.compiler }} -DENABLE_TESTS=ON ..
          make -j$(nproc)
          ctest --output-on-failure
          cd ..

      - name: Build (debug + sanitizers)
        run: make debug CC=${{ matrix.compiler }}

      - name: Build (portable dist) + smoke test
        run: |
          make clean
          make dist CC=${{ matrix.compiler }}
          file adaptive_ai_engine
          # Portable build must not dynamically link libstdc++/libgcc.
          if ldd adaptive_ai_engine | grep -Eq 'libstdc\+\+|libgcc_s'; then
            echo "ERROR: dist binary dynamically links libstdc++/libgcc"; exit 1
          fi
          ./adaptive_ai_engine --version

  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build (release)
        run: make release

      - name: Run tests
        run: make test
